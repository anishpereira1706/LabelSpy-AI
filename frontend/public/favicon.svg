<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Glowing circular background with a smooth gradient -->
  <circle cx="16" cy="16" r="14" fill="url(#bg-grad)" stroke="url(#stroke-grad)" stroke-width="1.5"/>
  <!-- Safety shield representation -->
  <path d="M16 7.5C13.5 7.5 11 9 11 12C11 17.5 16 22.5 16 25C16 22.5 21 17.5 21 12C21 9 18.5 7.5 16 7.5Z" fill="url(#shield-grad)" fill-opacity="0.9"/>
  <!-- Scanning line overlay -->
  <path d="M7 16H25" stroke="#818CF8" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <circle cx="16" cy="16" r="2.5" fill="#4F46E5"/>
  <defs>
    <linearGradient id="bg-grad" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#818CF8" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="stroke-grad" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#818CF8" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="11" y1="7.5" x2="21" y2="25" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
</svg>